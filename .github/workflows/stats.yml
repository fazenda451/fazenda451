name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p dist

      - name: Download GitHub Stats Card
        run: |
          for i in 1 2 3; do
            curl -f -s -o dist/github-stats.svg \
              "https://github-readme-stats.vercel.app/api?username=fazenda451&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=6C63FF&icon_color=6C63FF&text_color=C9D1D9"
            grep -q '<svg' dist/github-stats.svg && echo "✅ Stats OK" && break
            echo "⚠️ Retry $i..."
            sleep 5
          done

      - name: Download Streak Stats Card
        run: |
          for i in 1 2 3; do
            curl -f -s -o dist/streak-stats.svg \
              "https://streak-stats.demolab.com?user=fazenda451&theme=tokyonight&hide_border=true&background=0D1117&ring=6C63FF&fire=6C63FF&currStreakLabel=6C63FF"
            grep -q '<svg' dist/streak-stats.svg && echo "✅ Streak OK" && break
            echo "⚠️ Retry $i..."
            sleep 5
          done

      - name: Download Top Languages Card
        run: |
          for i in 1 2 3; do
            curl -f -s -o dist/languages.svg \
              "https://github-readme-stats.vercel.app/api/top-langs/?username=fazenda451&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=6C63FF&text_color=C9D1D9&layout=compact&langs_count=8"
            grep -q '<svg' dist/languages.svg && echo "✅ Languages OK" && break
            echo "⚠️ Retry $i..."
            sleep 5
          done

      - name: Show file sizes
        run: ls -lh dist/

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}